name: Build & Release

on:
  # 推送到main分支时触发
  push:
    branches: [ main ]
    tags: [ 'v*' ]  # 推送v开头的tag时触发
  # Pull Request时触发
  pull_request:
    branches: [ main ]
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 设置Gradle权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 构建Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}

      # 5. 构建Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}

      # 6. 上传APK产物
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  # 发布任务（仅在推送tag时触发）
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 构建Release APK
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}

      # 4. 创建GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
